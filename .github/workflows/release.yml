name: Release Bloa (All OS & All Bits)

on:
  push:
    tags: "*"

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # WINDOWS
          - os: windows-latest
            target: windows-x64
          - os: windows-latest
            target: windows-x86
          # LINUX & TERMUX
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-latest
            target: linux-i386
          # MACOS
          - os: macos-latest
            target: macos-universal

    steps:
      - uses: actions/checkout@v4

      - name: Install 32-bit support (Linux)
        if: matrix.target == 'linux-i386'
        run: sudo apt-get update && sudo apt-get install -y g++-multilib libc6-dev-i386

      - name: Configure & Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "windows-x86" ]]; then
            cmake -S . -B build -A Win32 -DCMAKE_BUILD_TYPE=Release
          elif [[ "${{ matrix.target }}" == "linux-i386" ]]; then
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32
          else
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build --config Release

      - name: Packaging
        shell: bash
        run: |
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          
          case "${{ matrix.target }}" in
            windows-x64)
              cp build/Release/bloa.exe dist/bloa_${VERSION}_windows_x64.exe ;;
            windows-x86)
              cp build/Release/bloa.exe dist/bloa_${VERSION}_windows_x86.exe ;;
            macos-universal)
              cp build/bloa dist/bloa_${VERSION}_macos_universal ;;
            linux-amd64)
              cp build/bloa dist/bloa_${VERSION}_linux_amd64
              # Termux 64-bit DEB
              T_ROOT="pkg_t64/data/data/com.termux/files/usr"
              mkdir -p "$T_ROOT/bin" "pkg_t64/DEBIAN"
              cp build/bloa "$T_ROOT/bin/bloa"
              echo "Package: bloa\nVersion: $VERSION\nArchitecture: aarch64\nMaintainer: bloa\nDescription: Bloa for Termux 64bit" > pkg_t64/DEBIAN/control
              dpkg-deb --build pkg_t64 dist/bloa_${VERSION}_termux_aarch64.deb ;;
            linux-i386)
              cp build/bloa dist/bloa_${VERSION}_linux_i386
              # Termux 32-bit DEB
              T_ROOT="pkg_t32/data/data/com.termux/files/usr"
              mkdir -p "$T_ROOT/bin" "pkg_t32/DEBIAN"
              cp build/bloa "$T_ROOT/bin/bloa"
              echo "Package: bloa\nVersion: $VERSION\nArchitecture: arm\nMaintainer: bloa\nDescription: Bloa for Termux 32bit" > pkg_t32/DEBIAN/control
              dpkg-deb --build pkg_t32 dist/bloa_${VERSION}_termux_arm.deb ;;
          esac

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
