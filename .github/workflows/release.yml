name: Release Bloa (All OS & All Bits)

on:
  push:
    tags: "*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Input version for testing'
        required: true
        default: '0.2.0-alpha'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
          - os: windows-latest
            target: windows-x86
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-latest
            target: linux-i386
          - os: macos-latest
            target: macos-universal

    steps:
      - uses: actions/checkout@v4

      - name: Install 32-bit (Linux Only)
        if: matrix.target == 'linux-i386'
        run: sudo apt-get update && sudo apt-get install -y g++-multilib libc6-dev-i386

      - name: Build Binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "windows-x86" ]]; then
            cmake -S . -B build -A Win32 -DCMAKE_BUILD_TYPE=Release
          elif [[ "${{ matrix.target }}" == "linux-i386" ]]; then
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32
          else
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build --config Release

      - name: Packaging
        shell: bash
        run: |2
          mkdir -p dist
          VERSION="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          case "${{ matrix.target }}" in
            windows-*)
              arch="${{ matrix.target == 'windows-x64' && 'x64' || 'x86' }}"
              cp build/Release/bloa.exe "dist/bloa_${VERSION}_windows_${arch}.exe"
              ;;
            
            macos-universal)
              cp build/bloa "dist/bloa_${VERSION}_macos_universal"
              chmod +x "dist/bloa_${VERSION}_macos_universal"
              ;;
            
            linux-*)
              arch="${{ matrix.target == 'linux-amd64' && 'amd64' || 'i386' }}"
              t_arch="${{ matrix.target == 'linux-amd64' && 'aarch64' || 'arm' }}"
              
              # Linux Standard
              L_ROOT="pkg_linux_${arch}"
              mkdir -p "$L_ROOT/DEBIAN" "$L_ROOT/usr/bin"
              cp build/bloa "$L_ROOT/usr/bin/bloa"
              chmod 0755 "$L_ROOT/DEBIAN" "$L_ROOT/usr/bin/bloa"
              cat > "$L_ROOT/DEBIAN/control" <<'EOF'
          Package: bloa
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${arch}
          Maintainer: bloa-lang
          Description: Bloa runtime for Standard Linux (${arch})
          EOF
              # Since we used 'EOF', variables won't expand inside. 
              # Let's fix that by using EOF without quotes for variable support:
              cat > "$L_ROOT/DEBIAN/control" <<EOF
          Package: bloa
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: $arch
          Maintainer: bloa-lang
          Description: Bloa runtime for Standard Linux ($arch)
          EOF
              dpkg-deb --build "$L_ROOT" "dist/bloa_${VERSION}_linux_${arch}.deb"
              
              # Termux
              T_ROOT="pkg_termux_${t_arch}"
              T_PFX="data/data/com.termux/files/usr"
              mkdir -p "$T_ROOT/DEBIAN" "$T_ROOT/$T_PFX/bin"
              cp build/bloa "$T_ROOT/$T_PFX/bin/bloa"
              chmod 0755 "$T_ROOT/DEBIAN" "$T_ROOT/$T_PFX/bin/bloa"
              cat > "$T_ROOT/DEBIAN/control" <<EOF
          Package: bloa
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: $t_arch
          Maintainer: bloa-lang
          Description: Bloa runtime for Termux ($t_arch)
          EOF
              dpkg-deb --build "$T_ROOT" "dist/bloa_${VERSION}_termux_${t_arch}.deb"
              
              cp build/bloa "dist/bloa_${VERSION}_linux_${arch}_bin"
              chmod +x "dist/bloa_${VERSION}_linux_${arch}_bin"
              ;;
          esac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name || github.event.inputs.version }}
          name: Release ${{ github.ref_name || github.event.inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
