name: Release Bloa (All OS & All Bits)

on:
  push:
    tags: "*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Input version for testing'
        required: true
        default: '0.2.0-alpha'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
          - os: windows-latest
            target: windows-x86
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-latest
            target: linux-i386
          - os: ubuntu-latest
            target: linux-arm64
          - os: ubuntu-latest
            target: linux-armhf
          - os: ubuntu-latest
            target: android-arm64
          - os: ubuntu-latest
            target: android-armv7
          - os: macos-latest
            target: macos-universal

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux Toolchains
        if: startsWith(matrix.target, 'linux')
        shell: bash
        run: |
          sudo apt-get update
          case "${{ matrix.target }}" in
            linux-i386)
              sudo apt-get install -y gcc-multilib g++-multilib libc6-dev-i386 libcurl4-openssl-dev libsqlite3-dev
              ;;
            linux-arm64)
              sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libcurl4-openssl-dev libsqlite3-dev
              ;;
            linux-armhf)
              sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf libcurl4-openssl-dev libsqlite3-dev
              ;;
            linux-amd64)
              sudo apt-get install -y libcurl4-openssl-dev libsqlite3-dev
              ;;
          esac

      - name: Install Android NDK
        if: startsWith(matrix.target, 'android-')
        uses: android-actions/setup-android@v4
        with:
          api-level: 24
          ndk: '25.2.9519653'

      - name: Build Binary
        shell: bash
        run: |
          BUILD_DIR="build-${{ matrix.target }}"
          mkdir -p "$BUILD_DIR"

          if [[ "${{ matrix.target }}" == "windows-x86" ]]; then
            cmake -S . -B "$BUILD_DIR" -A Win32 -DCMAKE_BUILD_TYPE=Release \
              -DBLOA_USE_CURL=OFF -DBLOA_USE_SQLITE=OFF
          elif [[ "${{ matrix.target }}" == "windows-x64" ]]; then
            cmake -S . -B "$BUILD_DIR" -A x64 -DCMAKE_BUILD_TYPE=Release \
              -DBLOA_USE_CURL=OFF -DBLOA_USE_SQLITE=OFF
          elif [[ "${{ matrix.target }}" == "linux-i386" ]]; then
            cmake -S . -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32 \
              -DBLOA_USE_CURL=OFF -DBLOA_USE_SQLITE=OFF
          elif [[ "${{ matrix.target }}" == "linux-arm64" ]]; then
            cmake -S . -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
              -DBLOA_USE_CURL=OFF -DBLOA_USE_SQLITE=OFF
          elif [[ "${{ matrix.target }}" == "linux-armhf" ]]; then
            cmake -S . -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_SYSTEM_PROCESSOR=arm \
              -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
              -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
              -DBLOA_USE_CURL=OFF -DBLOA_USE_SQLITE=OFF
          elif [[ "${{ matrix.target }}" == "macos-universal" ]]; then
            cmake -S . -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          elif [[ "${{ matrix.target }}" == "android-arm64" ]]; then
            cmake -S . -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_PLATFORM=android-24 \
              -DANDROID_STL=c++_static \
              -DBLOA_USE_CURL=OFF \
              -DBLOA_USE_SQLITE=OFF
          elif [[ "${{ matrix.target }}" == "android-armv7" ]]; then
            cmake -S . -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI=armeabi-v7a \
              -DANDROID_PLATFORM=android-24 \
              -DANDROID_STL=c++_static \
              -DBLOA_USE_CURL=OFF \
              -DBLOA_USE_SQLITE=OFF
          else
            cmake -S . -B "$BUILD_DIR" -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build "$BUILD_DIR" --config Release

      - name: Packaging
        shell: bash
        run: |
          mkdir -p dist
          VERSION="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          DEB_VERSION="${VERSION#v}"
          BUILD_DIR="build-${{ matrix.target }}"
          
          case "${{ matrix.target }}" in
            windows-*)
              arch="${{ matrix.target == 'windows-x64' && 'x64' || 'x86' }}"
              cp "$BUILD_DIR/Release/bloa.exe" "dist/bloa_${VERSION}_windows_${arch}.exe"
              ;;
            
            macos-universal)
              cp "$BUILD_DIR/bloa" "dist/bloa_${VERSION}_macos_universal"
              chmod +x "dist/bloa_${VERSION}_macos_universal"
              ;;
            
            linux-*)
              if [[ "${{ matrix.target }}" == "linux-amd64" ]]; then
                arch="amd64"
              elif [[ "${{ matrix.target }}" == "linux-i386" ]]; then
                arch="i386"
              elif [[ "${{ matrix.target }}" == "linux-arm64" ]]; then
                arch="arm64"
              else
                arch="armhf"
              fi
              
              L_ROOT="pkg_linux_${arch}"
              mkdir -p "$L_ROOT/DEBIAN" "$L_ROOT/usr/bin"
              cp "$BUILD_DIR/bloa" "$L_ROOT/usr/bin/bloa"
              chmod 0755 "$L_ROOT/DEBIAN" "$L_ROOT/usr/bin/bloa"
              cat > "$L_ROOT/DEBIAN/control" <<EOF
          Package: bloa
          Version: $DEB_VERSION
          Section: utils
          Priority: optional
          Architecture: $arch
          Maintainer: bloa-lang
          Description: Bloa runtime for Standard Linux ($arch)
          EOF
              dpkg-deb --build "$L_ROOT" "dist/bloa_${VERSION}_linux_${arch}.deb"
              
              cp "$BUILD_DIR/bloa" "dist/bloa_${VERSION}_linux_${arch}_bin"
              chmod +x "dist/bloa_${VERSION}_linux_${arch}_bin"
              ;;
            
            android-arm64)
              arch="arm64"
              t_arch="aarch64"
              T_ROOT="pkg_termux_${t_arch}"
              T_PFX="data/data/com.termux/files/usr"
              mkdir -p "$T_ROOT/DEBIAN" "$T_ROOT/$T_PFX/bin"
              cp "$BUILD_DIR/bloa" "$T_ROOT/$T_PFX/bin/bloa"
              chmod 0755 "$T_ROOT/DEBIAN" "$T_ROOT/$T_PFX/bin/bloa"
              cat > "$T_ROOT/DEBIAN/control" <<EOF
          Package: bloa
          Version: $DEB_VERSION
          Section: utils
          Priority: optional
          Architecture: $t_arch
          Maintainer: bloa-lang
          Description: Bloa runtime for Termux ($t_arch)
          EOF
              dpkg-deb --build "$T_ROOT" "dist/bloa_${VERSION}_termux_${t_arch}.deb"
              cp "$BUILD_DIR/bloa" "dist/bloa_${VERSION}_android_${arch}_bin"
              chmod +x "dist/bloa_${VERSION}_android_${arch}_bin"
              ;;
            
            android-armv7)
              arch="armhf"
              t_arch="arm"
              T_ROOT="pkg_termux_${t_arch}"
              T_PFX="data/data/com.termux/files/usr"
              mkdir -p "$T_ROOT/DEBIAN" "$T_ROOT/$T_PFX/bin"
              cp "$BUILD_DIR/bloa" "$T_ROOT/$T_PFX/bin/bloa"
              chmod 0755 "$T_ROOT/DEBIAN" "$T_ROOT/$T_PFX/bin/bloa"
              cat > "$T_ROOT/DEBIAN/control" <<EOF
          Package: bloa
          Version: $DEB_VERSION
          Section: utils
          Priority: optional
          Architecture: $t_arch
          Maintainer: bloa-lang
          Description: Bloa runtime for Termux ($t_arch)
          EOF
              dpkg-deb --build "$T_ROOT" "dist/bloa_${VERSION}_termux_${t_arch}.deb"
              cp "$BUILD_DIR/bloa" "dist/bloa_${VERSION}_android_${arch}_bin"
              chmod +x "dist/bloa_${VERSION}_android_${arch}_bin"
              ;;
          esac

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Set Release Version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
