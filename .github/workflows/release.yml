name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential g++-multilib libc6-dev-i386 dpkg-dev
      - name: Configure and build amd64
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - name: Package amd64
        run: |
          mkdir -p package_amd64/DEBIAN package_amd64/usr/local/bin
          cp build/bloa package_amd64/usr/local/bin/bloa
          cat > package_amd64/DEBIAN/control <<'EOF'
Package: bloa
Version: ${{ github.ref_name }}
Section: utils
Priority: optional
Architecture: amd64
Maintainer: bloa <noreply@local>
Description: bloa language runtime (${ { github.ref_name }})
EOF
          chmod 0755 package_amd64/DEBIAN
          dpkg-deb --build package_amd64 dist/bloa_${{ github.ref_name }}_amd64.deb
      - name: Configure and build i386
        run: |
          rm -rf build32
          cmake -S . -B build32 -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32
          cmake --build build32 --config Release
      - name: Package i386
        run: |
          mkdir -p package_i386/DEBIAN package_i386/usr/local/bin
          cp build32/bloa package_i386/usr/local/bin/bloa
          cat > package_i386/DEBIAN/control <<'EOF'
Package: bloa
Version: ${{ github.ref_name }}
Section: utils
Priority: optional
Architecture: i386
Maintainer: bloa <noreply@local>
Description: bloa language runtime (${ { github.ref_name }})
EOF
          chmod 0755 package_i386/DEBIAN
          dpkg-deb --build package_i386 dist/bloa_${{ github.ref_name }}_i386.deb
      - name: Package all
        run: |
          mkdir -p package_all/DEBIAN package_all/usr/local/bin
          cp build/bloa package_all/usr/local/bin/bloa
          cat > package_all/DEBIAN/control <<'EOF'
Package: bloa
Version: ${{ github.ref_name }}
Section: utils
Priority: optional
Architecture: all
Maintainer: bloa <noreply@local>
Description: bloa language runtime (architecture independent all package)
EOF
          chmod 0755 package_all/DEBIAN
          dpkg-deb --build package_all dist/bloa_${{ github.ref_name }}_all.deb
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: release-artifacts
          path: |
            build/bloa
            build32/bloa
            dist/*.deb
