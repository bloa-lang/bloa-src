name: Release Bloa (All OS & All Bits)

on:
  push:
    tags: "*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Input version for testing'
        required: true
        default: '0.2.0-alpha'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
          - os: windows-latest
            target: windows-x86
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-latest
            target: linux-i386
          - os: ubuntu-latest
            target: linux-arm64
          - os: ubuntu-latest
            target: linux-armhf
          - os: macos-latest
            target: macos-universal

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install Linux Toolchains
        if: startsWith(matrix.target, 'linux')
        shell: bash
        run: |
          sudo apt-get update
          case "${{ matrix.target }}" in
            linux-i386)
              sudo apt-get install -y gcc-multilib g++-multilib libc6-dev-i386
              ;;
            linux-arm64)
              sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
              ;;
            linux-armhf)
              sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
              ;;
            linux-amd64)
              echo "Amd64 uses default runner toolchain. Skipping..."
              ;;
          esac

      - name: Build Binary
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "windows-x86" ]]; then
            cmake -S . -B build -A Win32 -DCMAKE_BUILD_TYPE=Release
          elif [[ "${{ matrix.target }}" == "linux-i386" ]]; then
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32
          elif [[ "${{ matrix.target }}" == "linux-arm64" ]]; then
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
          elif [[ "${{ matrix.target }}" == "linux-armhf" ]]; then
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_SYSTEM_NAME=Linux \
              -DCMAKE_SYSTEM_PROCESSOR=arm \
              -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
              -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++
          elif [[ "${{ matrix.target }}" == "macos-universal" ]]; then
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          else
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build --config Release

      - name: Packaging
        shell: bash
        run: |
          mkdir -p dist
          VERSION="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          
          case "${{ matrix.target }}" in
            windows-*)
              arch="${{ matrix.target == 'windows-x64' && 'x64' || 'x86' }}"
              cp build/Release/bloa.exe "dist/bloa_${VERSION}_windows_${arch}.exe"
              ;;
            
            macos-universal)
              cp build/bloa "dist/bloa_${VERSION}_macos_universal"
              chmod +x "dist/bloa_${VERSION}_macos_universal"
              ;;
            
            linux-*)
              if [[ "${{ matrix.target }}" == "linux-amd64" ]]; then
                arch="amd64"
                t_arch="x86_64"
              elif [[ "${{ matrix.target }}" == "linux-i386" ]]; then
                arch="i386"
                t_arch="i686"
              elif [[ "${{ matrix.target }}" == "linux-arm64" ]]; then
                arch="arm64"
                t_arch="aarch64"
              else
                arch="armhf"
                t_arch="arm"
              fi
              
              # Linux Standard .deb
              L_ROOT="pkg_linux_${arch}"
              mkdir -p "$L_ROOT/DEBIAN" "$L_ROOT/usr/bin"
              cp build/bloa "$L_ROOT/usr/bin/bloa"
              chmod 0755 "$L_ROOT/DEBIAN" "$L_ROOT/usr/bin/bloa"
              cat > "$L_ROOT/DEBIAN/control" <<EOF
          Package: bloa
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: $arch
          Maintainer: bloa-lang
          Description: Bloa runtime for Standard Linux ($arch)
          EOF
              dpkg-deb --build "$L_ROOT" "dist/bloa_${VERSION}_linux_${arch}.deb"
              
              # Termux .deb
              T_ROOT="pkg_termux_${t_arch}"
              T_PFX="data/data/com.termux/files/usr"
              mkdir -p "$T_ROOT/DEBIAN" "$T_ROOT/$T_PFX/bin"
              cp build/bloa "$T_ROOT/$T_PFX/bin/bloa"
              chmod 0755 "$T_ROOT/DEBIAN" "$T_ROOT/$T_PFX/bin/bloa"
              cat > "$T_ROOT/DEBIAN/control" <<EOF
          Package: bloa
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: $t_arch
          Maintainer: bloa-lang
          Description: Bloa runtime for Termux ($t_arch)
          EOF
              dpkg-deb --build "$T_ROOT" "dist/bloa_${VERSION}_termux_${t_arch}.deb"
              
              # Standard Binaries
              cp build/bloa "dist/bloa_${VERSION}_linux_${arch}_bin"
              chmod +x "dist/bloa_${VERSION}_linux_${arch}_bin"
              ;;
          esac

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          retention-days: 1

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Set Release Version
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
